name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:

  # ==========================
  # Build Rust binaries (matrix)
  # ==========================
  build-binaries:
    name: Build binaries (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          # glibc Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz

          # macOS
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz

          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/rylai dist/
          tar czf rylai-${{ matrix.target }}.tar.gz -C dist rylai

      - name: Package binary (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/rylai.exe" -Destination dist/
          Compress-Archive -Path "dist/rylai.exe" -DestinationPath "rylai-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: |
            rylai-*.tar.gz
            rylai-*.zip

  # ==========================
  # Build Python wheels (Linux / Windows / macOS x86_64 + arm64)
  # ==========================
  build-wheels:
    name: Build wheels (${{ matrix.artifact_suffix }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux
            target: ""
          - os: windows-latest
            artifact_suffix: windows
            target: ""
          - os: macos-latest
            artifact_suffix: macos-x64
            target: x86_64-apple-darwin
          - os: macos-latest
            artifact_suffix: macos-arm64
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Add Rust target (macOS cross-compile)
        if: matrix.target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          manylinux: ${{ matrix.os == 'ubuntu-latest' && 'manylinux_2_17' || '' }}
          args: --release --strip --out dist ${{ matrix.target != '' && '--target ' || '' }}${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.artifact_suffix }}
          path: dist

  # ==========================
  # Create GitHub Release
  # ==========================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-binaries
      - build-wheels

    permissions:
      contents: write   # create release and upload assets

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bin-x86_64-unknown-linux-gnu
          path: dist/bin-x86_64-unknown-linux-gnu
      - uses: actions/download-artifact@v4
        with:
          name: bin-x86_64-apple-darwin
          path: dist/bin-x86_64-apple-darwin
      - uses: actions/download-artifact@v4
        with:
          name: bin-aarch64-apple-darwin
          path: dist/bin-aarch64-apple-darwin
      - uses: actions/download-artifact@v4
        with:
          name: bin-x86_64-pc-windows-msvc
          path: dist/bin-x86_64-pc-windows-msvc

      - name: Show all artifacts
        run: ls -R dist

      - name: Verify release artifacts
        run: |
          for dir in dist/bin-x86_64-unknown-linux-gnu dist/bin-x86_64-apple-darwin dist/bin-aarch64-apple-darwin dist/bin-x86_64-pc-windows-msvc; do
            test -d "$dir" && test "$(ls -1 "$dir" 2>/dev/null | wc -l)" -ge 1 || (echo "Missing artifacts in $dir"; exit 1)
          done
          echo "All binary artifacts present."

      - name: Flatten release assets
        run: |
          mkdir -p release
          cp dist/bin-x86_64-unknown-linux-gnu/* release/
          cp dist/bin-x86_64-apple-darwin/* release/
          cp dist/bin-aarch64-apple-darwin/* release/
          cp dist/bin-x86_64-pc-windows-msvc/* release/
          ls -la release/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*

  # ==========================
  # Publish to PyPI
  # ==========================
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: create-release

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: wheels-linux
          path: dist/wheels-linux
      - uses: actions/download-artifact@v4
        with:
          name: wheels-windows
          path: dist/wheels-windows
      - uses: actions/download-artifact@v4
        with:
          name: wheels-macos-x64
          path: dist/wheels-macos-x64
      - uses: actions/download-artifact@v4
        with:
          name: wheels-macos-arm64
          path: dist/wheels-macos-arm64

      - name: Merge wheels into one directory
        run: |
          mkdir -p dist/wheels
          cp dist/wheels-linux/*.whl dist/wheels/ 2>/dev/null || true
          cp dist/wheels-windows/*.whl dist/wheels/ 2>/dev/null || true
          cp dist/wheels-macos-x64/*.whl dist/wheels/ 2>/dev/null || true
          cp dist/wheels-macos-arm64/*.whl dist/wheels/ 2>/dev/null || true
          ls -la dist/wheels/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/wheels
          skip-existing: true

  # ==========================
  # Publish to crates.io
  # ==========================
  publish-crates:
    name: Publish crate
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - uses: actions/checkout@v4

      - name: Require CRATES_TOKEN
        run: |
          if [ -z "${{ secrets.CRATES_TOKEN }}" ]; then
            echo "::error::CRATES_TOKEN is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Publish crate
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
