name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:

  # ==========================
  # One compile per platform: PyPI wheels + GitHub Release binaries (from same maturin/cargo output)
  # ==========================
  build-wheels:
    name: Wheels + binary (${{ matrix.artifact_suffix }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          # Explicit --target so the binary lands under target/<triple>/release/ (matches binary_path below).
          # Without it, Cargo often emits to target/release/ on the default host triple.
          - os: ubuntu-latest
            artifact_suffix: linux
            maturin_args: --release --strip --out dist --target x86_64-unknown-linux-gnu
            binary_path: target/x86_64-unknown-linux-gnu/release/rylai
            bin_upload_name: bin-x86_64-unknown-linux-gnu
            out_file: rylai-x86_64-unknown-linux-gnu.tar.gz
            package_kind: unix
          - os: windows-latest
            artifact_suffix: windows
            maturin_args: --release --strip --out dist
            binary_path: target/release/rylai.exe
            bin_upload_name: bin-x86_64-pc-windows-msvc
            out_file: rylai-x86_64-pc-windows-msvc.zip
            package_kind: windows
          - os: windows-11-arm
            artifact_suffix: windows-arm64
            maturin_args: --release --strip --out dist
            binary_path: target/release/rylai.exe
            bin_upload_name: bin-aarch64-pc-windows-msvc
            out_file: rylai-aarch64-pc-windows-msvc.zip
            package_kind: windows
          - os: macos-latest
            artifact_suffix: macos-x64
            maturin_args: --release --strip --out dist --target x86_64-apple-darwin
            rust_targets: x86_64-apple-darwin
            binary_path: target/x86_64-apple-darwin/release/rylai
            bin_upload_name: bin-x86_64-apple-darwin
            out_file: rylai-x86_64-apple-darwin.tar.gz
            package_kind: unix
          - os: macos-latest
            artifact_suffix: macos-arm64
            maturin_args: --release --strip --out dist --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
            binary_path: target/aarch64-apple-darwin/release/rylai
            bin_upload_name: bin-aarch64-apple-darwin
            out_file: rylai-aarch64-apple-darwin.tar.gz
            package_kind: unix

    steps:
      - uses: actions/checkout@v4

      - name: Add Rust target (macOS cross-compile)
        if: startsWith(matrix.artifact_suffix, 'macos')
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          manylinux: ${{ matrix.os == 'ubuntu-latest' && 'manylinux_2_17' || '' }}
          args: ${{ matrix.maturin_args }}

      - name: Package standalone binary (Unix, same build as wheel)
        if: matrix.package_kind == 'unix'
        run: |
          mkdir -p dist-bin
          cp "${{ matrix.binary_path }}" dist-bin/rylai
          tar czf "${{ matrix.out_file }}" -C dist-bin rylai

      - name: Package standalone binary (Windows, same build as wheel)
        if: matrix.package_kind == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-bin | Out-Null
          Copy-Item "${{ matrix.binary_path }}" -Destination "dist-bin/rylai.exe"
          Compress-Archive -Path "dist-bin/rylai.exe" -DestinationPath "${{ matrix.out_file }}"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.artifact_suffix }}
          path: dist

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bin_upload_name }}
          path: ${{ matrix.out_file }}

  # ==========================
  # Build Python wheels (Linux musl x86_64 / aarch64) + standalone tarballs
  # ==========================
  build-wheels-linux-musl:
    name: Build wheels (linux-musl ${{ matrix.platform.artifact_suffix }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - target: x86_64-unknown-linux-musl
            image_tag: x86_64-musl
            artifact_suffix: x86_64
          - target: aarch64-unknown-linux-musl
            image_tag: aarch64-musl
            artifact_suffix: aarch64
    container:
      image: docker://messense/rust-musl-cross:${{ matrix.platform.image_tag }}

    steps:
      - uses: actions/checkout@v4

      # rust-musl-cross images may lag behind; edition 2024 needs a recent stable rustc.
      - name: Update Rust (keep image musl link settings)
        run: |
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.platform.target }} || true

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          manylinux: musllinux_1_2
          container: off
          args: --release --strip --out dist

      - name: Package standalone binary (same build as wheel)
        run: |
          mkdir -p dist-bin
          cp "target/${{ matrix.platform.target }}/release/rylai" dist-bin/
          tar czf "rylai-${{ matrix.platform.target }}.tar.gz" -C dist-bin rylai

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-musl-${{ matrix.platform.artifact_suffix }}
          path: dist

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.platform.target }}
          path: rylai-${{ matrix.platform.target }}.tar.gz

  # ==========================
  # Create GitHub Release
  # ==========================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-wheels
      - build-wheels-linux-musl

    permissions:
      contents: write   # create release and upload assets

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VER="${GITHUB_REF#refs/tags/v}"
          awk -v ver="$VER" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") found = 1
            }
            found { print }
          ' CHANGELOG.md > release_notes.md
          echo "Extracted notes for version $VER"
          head -20 release_notes.md

      - uses: actions/download-artifact@v4
        with:
          name: bin-x86_64-unknown-linux-gnu
          path: dist/bin-x86_64-unknown-linux-gnu
      - uses: actions/download-artifact@v4
        with:
          name: bin-x86_64-apple-darwin
          path: dist/bin-x86_64-apple-darwin
      - uses: actions/download-artifact@v4
        with:
          name: bin-aarch64-apple-darwin
          path: dist/bin-aarch64-apple-darwin
      - uses: actions/download-artifact@v4
        with:
          name: bin-x86_64-pc-windows-msvc
          path: dist/bin-x86_64-pc-windows-msvc
      - uses: actions/download-artifact@v4
        with:
          name: bin-x86_64-unknown-linux-musl
          path: dist/bin-x86_64-unknown-linux-musl
      - uses: actions/download-artifact@v4
        with:
          name: bin-aarch64-unknown-linux-musl
          path: dist/bin-aarch64-unknown-linux-musl
      - uses: actions/download-artifact@v4
        with:
          name: bin-aarch64-pc-windows-msvc
          path: dist/bin-aarch64-pc-windows-msvc

      - name: Show all artifacts
        run: ls -R dist

      - name: Verify release artifacts
        run: |
          for dir in \
            dist/bin-x86_64-unknown-linux-gnu \
            dist/bin-x86_64-unknown-linux-musl \
            dist/bin-aarch64-unknown-linux-musl \
            dist/bin-x86_64-apple-darwin \
            dist/bin-aarch64-apple-darwin \
            dist/bin-x86_64-pc-windows-msvc \
            dist/bin-aarch64-pc-windows-msvc \
          ; do
            test -d "$dir" && test "$(ls -1 "$dir" 2>/dev/null | wc -l)" -ge 1 || (echo "Missing artifacts in $dir"; exit 1)
          done
          echo "All binary artifacts present."

      - name: Flatten release assets
        run: |
          mkdir -p release
          cp dist/bin-x86_64-unknown-linux-gnu/* release/
          cp dist/bin-x86_64-unknown-linux-musl/* release/
          cp dist/bin-aarch64-unknown-linux-musl/* release/
          cp dist/bin-x86_64-apple-darwin/* release/
          cp dist/bin-aarch64-apple-darwin/* release/
          cp dist/bin-x86_64-pc-windows-msvc/* release/
          cp dist/bin-aarch64-pc-windows-msvc/* release/
          ls -la release/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: release/*

  # ==========================
  # Publish to PyPI
  # ==========================
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: create-release

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: wheels-linux
          path: dist/wheels-linux
      - uses: actions/download-artifact@v4
        with:
          name: wheels-windows
          path: dist/wheels-windows
      - uses: actions/download-artifact@v4
        with:
          name: wheels-macos-x64
          path: dist/wheels-macos-x64
      - uses: actions/download-artifact@v4
        with:
          name: wheels-macos-arm64
          path: dist/wheels-macos-arm64
      - uses: actions/download-artifact@v4
        with:
          name: wheels-linux-musl-x86_64
          path: dist/wheels-linux-musl-x86_64
      - uses: actions/download-artifact@v4
        with:
          name: wheels-linux-musl-aarch64
          path: dist/wheels-linux-musl-aarch64
      - uses: actions/download-artifact@v4
        with:
          name: wheels-windows-arm64
          path: dist/wheels-windows-arm64

      - name: Merge wheels into one directory
        run: |
          mkdir -p dist/wheels
          cp dist/wheels-linux/*.whl dist/wheels/ 2>/dev/null || true
          cp dist/wheels-windows/*.whl dist/wheels/ 2>/dev/null || true
          cp dist/wheels-macos-x64/*.whl dist/wheels/ 2>/dev/null || true
          cp dist/wheels-macos-arm64/*.whl dist/wheels/ 2>/dev/null || true
          cp dist/wheels-linux-musl-x86_64/*.whl dist/wheels/ 2>/dev/null || true
          cp dist/wheels-linux-musl-aarch64/*.whl dist/wheels/ 2>/dev/null || true
          cp dist/wheels-windows-arm64/*.whl dist/wheels/ 2>/dev/null || true
          ls -la dist/wheels/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/wheels
          skip-existing: true

  # ==========================
  # Publish to crates.io
  # ==========================
  publish-crates:
    name: Publish crate
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - uses: actions/checkout@v4

      - name: Require CRATES_TOKEN
        run: |
          if [ -z "${{ secrets.CRATES_TOKEN }}" ]; then
            echo "::error::CRATES_TOKEN is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Publish crate
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
